<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PawPal Connect</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" class="sprite">
    <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/><path d="M9.5 20v-6h5v6"/></symbol>
    <symbol id="i-map" viewBox="0 0 24 24"><path d="M9 18 3 21V6l6-3 6 3 6-3v15l-6 3-6-3Z"/><path d="M9 3v15"/><path d="M15 6v15"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></symbol>
    <symbol id="i-task" viewBox="0 0 24 24"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="m3 6 1 1 2-2"/><path d="m3 12 1 1 2-2"/><path d="m3 18 1 1 2-2"/></symbol>
    <symbol id="i-user" viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="8" r="4"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></symbol>
    <symbol id="i-filter" viewBox="0 0 24 24"><path d="M4 6h16"/><path d="M7 12h10"/><path d="M10 18h4"/></symbol>
    <symbol id="i-bell" viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M10 21h4"/></symbol>
    <symbol id="i-back" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></symbol>
    <symbol id="i-close" viewBox="0 0 24 24"><path d="m6 6 12 12"/><path d="M18 6 6 18"/></symbol>
    <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 22s8-4 8-11V5l-8-3-8 3v6c0 7 8 11 8 11Z"/><path d="m9 12 2 2 4-5"/></symbol>
    <symbol id="i-heart" viewBox="0 0 24 24"><path d="M20.8 5.9a5.4 5.4 0 0 0-7.7 0L12 7l-1.1-1.1a5.4 5.4 0 1 0-7.7 7.7L12 22l8.8-8.4a5.4 5.4 0 0 0 0-7.7Z"/></symbol>
    <symbol id="i-card" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M3 10h18"/><path d="M7 15h4"/></symbol>
    <symbol id="i-camera" viewBox="0 0 24 24"><path d="M4 8h4l2-3h4l2 3h4v11H4Z"/><circle cx="12" cy="14" r="3"/></symbol>
    <symbol id="i-settings" viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/><path d="M4 12h2"/><path d="M18 12h2"/><path d="m6.3 6.3 1.4 1.4"/><path d="m16.3 16.3 1.4 1.4"/><path d="m17.7 6.3-1.4 1.4"/><path d="m7.7 16.3-1.4 1.4"/></symbol>
  </svg>

  <main class="stage">
    <section class="phone" id="phone">
      <div class="status">
        <span>9:41</span>
        <div class="system"><i></i><i></i><i></i><span class="battery"></span></div>
      </div>
      <section class="screen" id="screen" aria-live="polite"></section>
      <nav class="bottom-nav" id="bottomNav" hidden>
        <button data-tab="feed"><svg><use href="#i-home"></use></svg><span>Feed</span></button>
        <button data-tab="explore"><svg><use href="#i-map"></use></svg><span>Explore</span></button>
        <button data-tab="create"><svg><use href="#i-plus"></use></svg><span>Post</span></button>
        <button data-tab="tasks"><svg><use href="#i-task"></use></svg><span>Tasks</span></button>
        <button data-tab="profile" class="nav-profile"><b id="navBadge" hidden>0</b><svg><use href="#i-user"></use></svg><span>Profile</span></button>
      </nav>
      <div class="modal" id="modal" hidden>
        <div class="modal-card">
          <div class="row">
            <h2 id="modalTitle">Done</h2>
            <button class="icon-btn" data-close-modal aria-label="Close"><svg><use href="#i-close"></use></svg></button>
          </div>
          <p id="modalText">Action completed.</p>
          <button class="btn" id="modalPrimary">Continue</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
